---
- name: Playbook de Actualizacion Masiva de Windows (Modo Auto-Rescate)
  hosts: all
  gather_facts: yes
  
  vars:
    # Tiempos de espera generosos para que no de error de conexión (Timeout)
    ansible_winrm_read_timeout_sec: 150
    ansible_winrm_operation_timeout_sec: 120

  tasks:
    # Tarea 1: Instalación con Bucle Automático
    - name: Instalar TODOS los parches (Criticos, Seguridad, Acumulativos y Defender)
      ansible.windows.win_updates:
        category_names:
          - SecurityUpdates
          - CriticalUpdates
          - UpdateRollups      
          - DefinitionUpdates  
        server_selection: windows_update
        state: installed
        reboot: yes
        reboot_timeout: 3600
      register: resultado_actualizacion
      # AQUÍ ESTÁ LO QUE FALTABA:
      # Repetir la tarea HASTA que el contador de parches encontrados sea 0
      until: resultado_actualizacion.found_update_count == 0
      # Intentará el ciclo completo (instalar + reiniciar) hasta 5 veces si es necesario
      retries: 5
      # Espera 1 minuto entre cada ciclo para que Windows respire
      delay: 60

    # Tarea 2: Limpieza final de la pantalla de Windows Update
    - name: Forzar refresco visual de Windows Update
      ansible.windows.win_updates:
        category_names:
          - SecurityUpdates
          - CriticalUpdates
          - UpdateRollups
          - DefinitionUpdates
        server_selection: windows_update
        state: searched
