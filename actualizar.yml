---
- name: Playbook de Actualizacion Masiva de Windows
  hosts: all
  gather_facts: yes
  
  vars:
    ansible_winrm_read_timeout_sec: 120
    ansible_winrm_operation_timeout_sec: 90

  tasks:
    # Tarea 1: Hace el trabajo pesado y reinicia
    - name: Instalar parches criticos y de seguridad
      ansible.windows.win_updates:
        category_names:
          - SecurityUpdates
          - CriticalUpdates
        server_selection: microsoft_update
        state: installed
        reboot: yes
        reboot_timeout: 3600

    # Tarea 2: El truco para limpiar la pantalla "Pending"
    - name: Forzar refresco visual de Windows Update
      ansible.windows.win_updates:
        category_names:
          - SecurityUpdates
          - CriticalUpdates
        server_selection: microsoft_update
        state: searched
